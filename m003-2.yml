mode: targeted

tenant:
  tenant_id: 
  domain: 
  subscription_id: 

  # Identity resources
  users: 1                     # Add 1 user to pass validation (won't be used)
  applications: 2              # Two service principals
  groups: 0
  administrative_units: 0

  # Azure resources
  resource_groups: 1
  key_vaults: 1
  storage_accounts: 0
  virtual_machines: 1
  logic_apps: 0
  automation_accounts: 0
  function_apps: 0

attack_paths:
  email_exfiltration_via_mi:
    enabled: true
    initial_access: token
    privilege_escalation: ManagedIdentityTheft
    source_type: vm
    target_resource_type: key_vault
    credential_type: certificate
    entry_point: compromised_identity
    identity_type: service_principal         # First SP has VM Contributor role
    method: APIPermission
    api_type: graph
    app_role: 810c84a8-4a9e-49e6-bf7d-12d183f40d01  # Mail.Read
    entities:
      resource_groups:
        - name: random
      applications:
        - name: random  # Second app (Mail.Read - credentials in KV)
        - name: random  # First app (VM Contributor - initial access)
      users:
        - name: random  # Dummy user to pass validation
      key_vaults:
        - name: random
          resource_group: random  # ADD THIS LINE - required for targeted mode
      virtual_machines:
        - name: test-m003-vm
          os_type: Windows
          resource_group: random

 