site_name: BadZure Documentation
site_description: Automate the deployment of intentionally misconfigured Entra ID tenants and Azure subscriptions, populating them with diverse entities and configurable, traversable attack paths.
site_author: Mauricio Velazco
site_url: https://mvelazc0.github.io/BadZure

repo_name: mvelazc0/BadZure
repo_url: https://github.com/mvelazc0/BadZure

theme:
  name: material
  logo: img/BadZure-cropped.png
  favicon: img/BadZure-cropped.png
  palette:
    - scheme: slate
      primary: blue
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow
    - toc.integrate

nav:
  - BadZure:
    - Home: index.md
    - What Are Attack Paths?: what-are-attack-paths.md
    - Getting Started: getting-started.md
    - Configuration Guide: configuration.md
    - Talks & Demos: talks-and-demos.md
  - Attack Paths:
    - Overview: attack-paths/index.md
    - ApplicationOwnershipAbuse: attack-paths/app-ownership-abuse.md
    - ApplicationAdministratorAbuse: attack-paths/app-administrator-abuse.md
    - CloudAppAdministratorAbuse: attack-paths/cloud-app-administrator-abuse.md
    - ManagedIdentityTheft: attack-paths/managed-identity-theft.md
    - KeyVaultSecretTheft: attack-paths/keyvault-secret-theft.md
    - StorageCertificateTheft: attack-paths/storage-certificate-theft.md
    - CosmosDBSecretTheft: attack-paths/cosmosdb-secret-theft.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-1B8G0DW1EN
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mvelazc0/BadZure
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/mvelazco
