mode: targeted

tenant:
  tenant_id:
  domain:
  subscription_id:

attack_paths:
  email_exfiltration_via_mi:
    enabled: true
    initial_access: token
    privilege_escalation: ManagedIdentityTheft
    source_type: vm
    target_resource_type: key_vault
    credential_type: secret
    entry_point: compromised_identity
    identity_type: service_principal         # First SP has VM Contributor role
    method: APIPermission
    api_type: graph
    app_role: 810c84a8-4a9e-49e6-bf7d-12d183f40d01  # Mail.Read
    entities:
      resource_groups:
        - name: newSuper_RG_11
      applications:
        - name: SuperApp  # Second app (Mail.Read - credentials in KV)
        - name: RandomApp  # First app (VM Contributor - initial access)
      key_vaults:
        - name: superkvz003
          resource_group: newSuper_RG_11 
      virtual_machines:
        - name: test-m003-vm
          os_type: Windows
          resource_group: newSuper_RG_11
 